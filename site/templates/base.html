<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}How NYC Works{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
</head>
<body class="{% block body_class %}desktop{% endblock %}">
    <div class="window">
        <div class="window-titlebar">
            <span class="window-title">
                <span class="window-title-icon" aria-hidden="true">▓</span>
                {% block window_title %}How NYC Works{% endblock %}
            </span>
            <span class="window-controls" aria-hidden="true">
                <span class="window-control bevel-out">_</span>
                <span class="window-control bevel-out">□</span>
                <span class="window-control bevel-out">×</span>
            </span>
        </div>

        <main class="window-body">
            {% block content %}{% endblock %}
        </main>

        <div class="window-statusbar" aria-hidden="true">
            {% block statusbar %}
            <span class="status-cell status-cell--sm"></span>
            <span class="status-cell"></span>
            <span class="status-cell status-cell--sm"></span>
            {% endblock %}
        </div>
    </div>
</body>
</html>
